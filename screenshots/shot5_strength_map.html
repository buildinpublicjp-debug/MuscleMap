<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Inter:wght@500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1284px;
    height: 2778px;
    background: linear-gradient(170deg, #0D1117 0%, #101018 30%, #1A1A2E 100%);
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景グロー — シアン寄り */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .copy-area {
    padding: 140px 80px 48px;
    text-align: center;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .main-copy {
    font-size: 76px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.25;
    letter-spacing: 2px;
  }

  .sub-copy {
    font-size: 34px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  .en-copy {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .accent { color: #00FFB3; }
  .accent-cyan { color: #00D4FF; }

  .pro-badge {
    display: inline-block;
    margin-top: 28px;
    padding: 10px 36px;
    background: linear-gradient(135deg, #00FFB3 0%, #00D4FF 100%);
    border-radius: 30px;
    color: #0D1117;
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 3px;
  }

  .grade-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 28px;
  }

  .grade {
    width: 68px;
    height: 68px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 900;
    color: #0D1117;
    position: relative;
  }

  .grade-s {
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
  }
  .grade-a {
    background: linear-gradient(135deg, #00FFB3 0%, #00CC8E 100%);
    box-shadow: 0 4px 20px rgba(0, 255, 179, 0.25);
  }
  .grade-b {
    background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%);
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25);
  }
  .grade-c {
    background: rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.7);
  }
  .grade-d {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.4);
  }

  .screen-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px 80px;
    width: 100%;
  }

  .device-frame {
    width: 600px;
    border-radius: 52px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 60px 120px rgba(0, 212, 255, 0.08),
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 200px rgba(0, 212, 255, 0.04);
    background: #000;
  }

  .device-frame img {
    width: 100%;
    display: block;
  }

  .placeholder {
    width: 100%;
    aspect-ratio: 1284 / 2778;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 28px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="copy-area">
    <div class="main-copy">
      筋力が<span class="accent">太さ</span>で見える。
    </div>
    <div class="sub-copy">PRデータから筋力レベルを可視化</div>
    <div class="en-copy">Strength Map — see your power</div>
    <div class="pro-badge">PRO</div>
    <div class="grade-row">
      <div class="grade grade-s">S</div>
      <div class="grade grade-a">A</div>
      <div class="grade grade-b">B</div>
      <div class="grade grade-c">C</div>
      <div class="grade grade-d">D</div>
    </div>
  </div>
  <div class="screen-area">
    <div class="device-frame">
      <img src="screens/shot5_screen.png"
           alt="Strength Map"
           onerror="this.outerHTML='<div class=placeholder>shot5_screen.png</div>'">
    </div>
  </div>
</body>
</html>
