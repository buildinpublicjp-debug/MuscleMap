<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Inter:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1284px;
    height: 2778px;
    background: linear-gradient(170deg, #0D1117 0%, #151520 30%, #1A1A2E 100%);
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景グロー — 紫寄り */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(179, 136, 212, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .copy-area {
    padding: 140px 80px 48px;
    text-align: center;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .main-copy {
    font-size: 76px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.25;
    letter-spacing: 2px;
  }

  .sub-copy {
    font-size: 34px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  .en-copy {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .accent { color: #B388D4; }

  .badge {
    display: inline-block;
    margin-top: 32px;
    padding: 14px 36px;
    background: rgba(179, 136, 212, 0.12);
    border: 1px solid rgba(179, 136, 212, 0.35);
    border-radius: 40px;
    color: #B388D4;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .screen-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px 80px;
    width: 100%;
  }

  .device-frame {
    width: 600px;
    border-radius: 52px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 60px 120px rgba(179, 136, 212, 0.1),
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 200px rgba(179, 136, 212, 0.04);
    background: #000;
  }

  .device-frame img {
    width: 100%;
    display: block;
  }

  .placeholder {
    width: 100%;
    aspect-ratio: 1284 / 2778;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 28px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="copy-area">
    <div class="main-copy">
      サボった筋肉、<span class="accent">バレてる</span>。
    </div>
    <div class="sub-copy">7日以上の未刺激を紫で警告</div>
    <div class="en-copy">Neglect alerts — only in MuscleMap</div>
    <div class="badge">MuscleMapだけの機能</div>
  </div>
  <div class="screen-area">
    <div class="device-frame">
      <img src="screens/shot2_screen.png"
           alt="Neglect Warning"
           onerror="this.outerHTML='<div class=placeholder>shot2_screen.png</div>'">
    </div>
  </div>
</body>
</html>
