<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Inter:wght@500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1284px;
    height: 2778px;
    background: linear-gradient(170deg, #0D1117 0%, #121212 30%, #1A1A2E 100%);
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景グロー — ゴールド寄り */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .copy-area {
    padding: 140px 80px 48px;
    text-align: center;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .main-copy {
    font-size: 76px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.25;
    letter-spacing: 2px;
  }

  .sub-copy {
    font-size: 34px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  .en-copy {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .accent { color: #FFD700; }

  .pr-badge {
    display: inline-block;
    margin-top: 32px;
    padding: 14px 48px;
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.08) 100%);
    border: 1.5px solid rgba(255, 215, 0, 0.45);
    border-radius: 40px;
    color: #FFD700;
    font-family: 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 4px;
  }

  .screen-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px 80px;
    width: 100%;
  }

  .device-frame {
    width: 600px;
    border-radius: 52px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 60px 120px rgba(255, 215, 0, 0.08),
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 200px rgba(255, 215, 0, 0.03);
    background: #000;
  }

  .device-frame img {
    width: 100%;
    display: block;
  }

  .placeholder {
    width: 100%;
    aspect-ratio: 1284 / 2778;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 28px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="copy-area">
    <div class="main-copy">
      自己ベスト、<span class="accent">自動で</span>検出。
    </div>
    <div class="sub-copy">PR更新をリアルタイムで祝福</div>
    <div class="en-copy">Auto PR detection &amp; celebration</div>
    <div class="pr-badge">NEW PR!</div>
  </div>
  <div class="screen-area">
    <div class="device-frame">
      <img src="screens/shot3_screen.png"
           alt="PR Detection"
           onerror="this.outerHTML='<div class=placeholder>shot3_screen.png</div>'">
    </div>
  </div>
</body>
</html>
