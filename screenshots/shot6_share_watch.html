<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Inter:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1284px;
    height: 2778px;
    background: linear-gradient(170deg, #0D1117 0%, #121212 30%, #1A1A2E 100%);
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景グロー */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(0, 255, 179, 0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .copy-area {
    padding: 140px 80px 48px;
    text-align: center;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .main-copy {
    font-size: 76px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.25;
    letter-spacing: 2px;
  }

  .sub-copy {
    font-size: 34px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  .en-copy {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .accent { color: #00FFB3; }

  .platform-icons {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 32px;
  }

  .platform-icon {
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .platform-icon.watch {
    background: rgba(0, 255, 179, 0.06);
    border-color: rgba(0, 255, 179, 0.2);
    color: #00FFB3;
  }

  .screen-area-dual {
    flex: 1;
    display: flex;
    gap: 48px;
    align-items: center;
    justify-content: center;
    padding: 0 40px 80px;
    width: 100%;
  }

  .device-frame-main {
    width: 500px;
    border-radius: 48px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 60px 120px rgba(0, 255, 179, 0.08),
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 200px rgba(0, 255, 179, 0.03);
    background: #000;
    transform: perspective(1200px) rotateY(-4deg);
  }

  .device-frame-watch {
    width: 240px;
    border-radius: 56px;
    overflow: hidden;
    border: 4px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 40px 80px rgba(0, 255, 179, 0.06),
      0 0 0 1px rgba(255, 255, 255, 0.04);
    background: #000;
    transform: perspective(1200px) rotateY(4deg);
    align-self: center;
  }

  .device-frame-main img,
  .device-frame-watch img {
    width: 100%;
    display: block;
  }

  .placeholder {
    width: 100%;
    aspect-ratio: 1284 / 2778;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 24px;
    font-weight: 500;
  }

  .placeholder-watch {
    width: 100%;
    aspect-ratio: 1 / 1.2;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 18px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="copy-area">
    <div class="main-copy">
      記録を、<span class="accent">自慢</span>に変える。
    </div>
    <div class="sub-copy">シェアカード + Apple Watch対応</div>
    <div class="en-copy">Share cards &amp; Apple Watch</div>
    <div class="platform-icons">
      <span class="platform-icon">Instagram</span>
      <span class="platform-icon">X / Twitter</span>
      <span class="platform-icon watch">Apple Watch</span>
    </div>
  </div>
  <div class="screen-area-dual">
    <div class="device-frame-main">
      <img src="screens/shot6_share_screen.png"
           alt="Share Card"
           onerror="this.outerHTML='<div class=placeholder>shot6_share_screen.png</div>'">
    </div>
    <div class="device-frame-watch">
      <img src="screens/shot6_watch_screen.png"
           alt="Apple Watch"
           onerror="this.outerHTML='<div class=placeholder-watch>shot6_watch.png</div>'">
    </div>
  </div>
</body>
</html>
