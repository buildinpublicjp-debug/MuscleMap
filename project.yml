name: MuscleMap
options:
  bundleIdPrefix: com.buildinpublic
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

targets:
  MuscleMap:
    type: application
    platform: iOS
    sources:
      - path: MuscleMap
        excludes:
          - "**/.DS_Store"
      - path: Shared
      - path: Resources/exercises.json
        buildPhase: resources
      - path: Resources/3DModels
        buildPhase: resources
      - path: Resources/exercises_gif
        buildPhase: resources
        type: folder
    dependencies:
      - target: MuscleMapWidgetExtension
    entitlements:
      path: MuscleMap/MuscleMap.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.buildinpublic.MuscleMap
    info:
      path: MuscleMap/Info.plist
      properties:
        LSApplicationQueriesSchemes:
          - instagram-stories
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buildinpublic.MuscleMap
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "5.9"
        INFOPLIST_GENERATION_ENABLED: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_CFBundleDisplayName: "MuscleMap"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MuscleMapWidgetExtension:
    type: app-extension
    platform: iOS
    product: MuscleMapWidgetExtension
    sources:
      - path: MuscleMapWidget
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    entitlements:
      path: MuscleMapWidget/MuscleMapWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.buildinpublic.MuscleMap
    info:
      path: MuscleMapWidget/Info.plist
      properties:
        CFBundleDisplayName: "MuscleMap Widget"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buildinpublic.MuscleMap.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "5.9"

  MuscleMapWatch:
    type: application
    platform: watchOS
    sources:
      - path: MuscleMapWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
      - path: MuscleMap/Models/Muscle.swift
      - path: MuscleMap/Models/ExerciseDefinition.swift
      - path: Resources/exercises.json
        buildPhase: resources
    entitlements:
      path: MuscleMapWatch/MuscleMapWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.buildinpublic.MuscleMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buildinpublic.MuscleMap.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.buildinpublic.MuscleMap
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true

  MuscleMapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuscleMapTests
        excludes:
          - "**/.DS_Store"
      - path: Resources/exercises.json
        buildPhase: resources
    dependencies:
      - target: MuscleMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buildinpublic.MuscleMapTests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
